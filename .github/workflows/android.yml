name: Gerar APK (SAMP Launcher)

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch: # Isso cria o botão manual mágico no GitHub!

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Baixando o código fonte
      uses: actions/checkout@v4
      
    - name: Configurando o Java (JDK 11)
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Dando permissão de execução ao Gradle
      run: chmod +x gradlew
      
    - name: Compilando o Aplicativo (Construindo o APK)
      # Usamos assembleDebug para não precisar de chaves de assinatura complexas agora
      run: ./gradlew assembleDebug 

    - name: Salvando o APK para você fazer o Download!
      uses: actions/upload-artifact@v4
      with:
        name: Meu-Launcher-SAMP
        path: app/build/outputs/apk/debug/*.apk
